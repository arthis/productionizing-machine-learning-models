version: "3.9"

services:

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: streamlit-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - metaflow
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./dashboard:/app # Mount for automatic updates

  metaflow:
    build:
      context: .
      dockerfile: metaflow_pipeline/Dockerfile
    container_name: metaflow-pipeline
    env_file:
      - .env
    stdin_open: true
    tty: true
    command: tail -f /dev/null
    volumes:
      - ./metaflow_pipeline:/app     # Mount code into /app inside the container

  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile
    container_name: sentiment-inference
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./inference:/app     # Mount code into /app inside the container